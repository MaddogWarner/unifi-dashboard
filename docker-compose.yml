services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-unifi_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-dashboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./services/api
    image: ghcr.io/maddogwarner/unifi-dashboard/api:latest
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      SCANNER_BASE_URL: http://scanner:8002
    depends_on:
      postgres:
        condition: service_healthy
      scanner:
        condition: service_healthy

  frontend:
    build: ./services/frontend
    image: ghcr.io/maddogwarner/unifi-dashboard/frontend:latest
    depends_on:
      - api

  mcp:
    build: ./services/mcp
    image: ghcr.io/maddogwarner/unifi-dashboard/mcp:latest
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "8001:8001"

  scanner:
    build: ./services/scanner
    image: ghcr.io/maddogwarner/unifi-dashboard/scanner:latest
    cap_add:
      - NET_RAW
      - NET_ADMIN
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=3).read()"]
      interval: 5s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend

volumes:
  pgdata:
