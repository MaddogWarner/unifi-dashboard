events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;

  upstream api {
    server api:8000;
  }

  upstream frontend {
    server frontend:3000;
  }

  limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=api_login:10m rate=5r/m;
  limit_req_zone $binary_remote_addr zone=api_expensive:10m rate=2r/m;
  limit_conn_zone $binary_remote_addr zone=api_addr:10m;
  limit_req_status 429;
  limit_conn_status 429;

  # Redirect all HTTP to HTTPS
  server {
    listen 80;

    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    location = /api/v1/auth/login {
      limit_req          zone=api_login burst=5 nodelay;
      limit_conn         api_addr 10;
      client_max_body_size 64k;
      proxy_pass         http://api;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
    }

    location ^~ /api/v1/scan/ {
      limit_req          zone=api_expensive burst=2 nodelay;
      limit_conn         api_addr 3;
      client_max_body_size 64k;
      proxy_pass         http://api;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
      proxy_read_timeout 300s;
    }

    location = /api/v1/threatfeed/refresh {
      limit_req          zone=api_expensive burst=2 nodelay;
      limit_conn         api_addr 3;
      client_max_body_size 256k;
      proxy_pass         http://api;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
      proxy_read_timeout 300s;
    }

    location ~ ^/api/v1/threatfeed/pending-rules/[0-9]+/(approve|reject)$ {
      limit_req          zone=api_expensive burst=2 nodelay;
      limit_conn         api_addr 3;
      client_max_body_size 64k;
      proxy_pass         http://api;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
      # Threat-feed approve and on-demand scans make slow sequential
      # UniFi/nmap calls; the default 60s read timeout returns 502 before
      # they finish.
      proxy_read_timeout 300s;
    }

    location /api/ {
      limit_req          zone=api_general burst=30 nodelay;
      limit_conn         api_addr 20;
      client_max_body_size 1m;
      proxy_pass         http://api;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
      proxy_read_timeout 60s;
    }

    location / {
      proxy_pass         http://frontend;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
    }
  }
}
